<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>Stellar Princesses</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;margin:0;padding:0;overflow:hidden;width:100vw;height:100vh;display:flex;justify-content:center;align-items:center}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#game-container{position:relative}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ffd166;font-size:14px;text-align:center;z-index:30;font-family:monospace}
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@4.2.0/dist/phaser.min.js"></script>
</head>
<body>
<div id="game-container">
<div id="loading">Loading...</div>
</div>
<script>
var GAME_W = 480, GAME_H = 270;
document.addEventListener('keydown', function(e) {
  if (e.key === 'Tab' || (e.key.length > 1 && e.key.length <= 3 && e.key[0] === 'F')) {
    e.preventDefault();
  }
});
function scaleCanvas() {
  var canvas = document.querySelector('canvas');
  if (!canvas) return;
  var scale = Math.max(1, Math.floor(Math.min(window.innerWidth / GAME_W, window.innerHeight / GAME_H)));
  canvas.style.width = (GAME_W * scale) + 'px';
  canvas.style.height = (GAME_H * scale) + 'px';
}
window.addEventListener('resize', scaleCanvas);
setInterval(scaleCanvas, 500);
setTimeout(scaleCanvas, 100);
</script>
<script type="module" src="./src/main.js"></script>
</body>
</html>
