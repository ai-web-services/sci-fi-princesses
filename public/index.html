<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Princesses — Sci-Fi RPG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;width:100%;height:100%}
#game-container{position:relative;width:100vw;height:100vh}
canvas#ui-layer{position:absolute;top:0;left:0;pointer-events:none}
#controller-status{position:absolute;bottom:8px;right:12px;color:#4af;font-size:14px;z-index:20;font-family:monospace;text-shadow:0 0 6px #000}
</style>
</head>
<body>
<div id="game-container">
<canvas id="game-layer"></canvas>
<canvas id="ui-layer"></canvas>
<div id="controller-status">🎮 Controller: Disconnected</div>
</div>
<script src="engine.js"></script>
<script src="maps.js"></script>
<script src="entities.js"></script>
<script src="combat.js"></script>
<script src="ui.js"></script>
<script src="game.js"></script>
</body>
</html>
